name: Android CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  static-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.marcelo.souza.listadetarefas"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

      - name: Detekt
        run: ./gradlew detektAll

      - name: Assemble Debug
        run: ./gradlew assembleDebug

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.marcelo.souza.listadetarefas"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest

  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.marcelo.souza.listadetarefas"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

      - name: Run androidTest on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          ram-size: 4096M
          heap-size: 1024M
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload Android Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results

  snapshot-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.marcelo.souza.listadetarefas"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

      - name: Run Shot tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          ram-size: 4096M
          heap-size: 1024M
          script: ./gradlew executeScreenshotTests

      - name: Upload Snapshot Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shot-reports
          path: |
            app/build/reports/shot
            app/build/outputs/shot
