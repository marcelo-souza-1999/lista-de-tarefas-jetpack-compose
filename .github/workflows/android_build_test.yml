name: Build & Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.marcelo.souza.listadetarefas"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set execute permissions for gradlew
        run: chmod +x ./gradlew

      - name: Detekt Verification
        run: ./gradlew detektAll

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: lint

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest