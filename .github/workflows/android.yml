name: Android CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Node.js (para o Danger)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Danger)
        run: npm install

      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.marcelo.souza.listadetarefas"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

      - name: Static Analysis (Detekt & Lint)
        run: ./gradlew detektAll lintDebug

      - name: Run Unit Tests & Kover
        run: ./gradlew testDebugUnitTest koverHtmlReportDebug

      - name: Run Danger
        if: github.event_name == 'pull_request'
        run: npx danger ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Reports & APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            app/build/reports/detekt
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/testDebugUnitTest
            app/build/reports/kover/htmlDebug
            app/build/outputs/apk/debug/app-debug.apk